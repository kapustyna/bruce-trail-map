<!DOCTYPE html>
<html>
<head>
  <title>bruce-trail-map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet map library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 90vh; }
  </style>
</head>

<body>

<h2>Justyna & Raymond Take on The Bruce Trail</h2>

<h3>Justyna 🟣</h3>
<input id="justynaKm" type="number" placeholder="Enter km">
<button onclick="moveJustyna()">Move</button>

<h3>Raymond 🟢</h3>
<input id="raymondKm" type="number" placeholder="Enter km">
<button onclick="moveRaymond()">Move</button>
  
<div id="map"></div>

<script>
var map = L.map('map').setView([43.1, -79.1], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

var trail = [
  [43.1, -79.1],
  [43.5, -79.8],
  [44.0, -80.2],
  [44.6, -80.8],
  [45.0, -81.0]
];

L.polyline(trail, { color: 'brown' }).addTo(map);

var justynaMarker = L.marker(trail[0]).addTo(map);
var raymondMarker = L.marker(trail[0]).addTo(map);

function moveJustyna() {
  let km = Number(document.getElementById("justynaKm").value);
  let index = Math.floor(km / 10);
  if (index >= trail.length) index = trail.length - 1;
  justynaMarker.setLatLng(trail[index]);
}

function moveRaymond() {
  let km = Number(document.getElementById("raymondKm").value);
  let index = Math.floor(km / 10);
  if (index >= trail.length) index = trail.length - 1;
  raymondMarker.setLatLng(trail[index]);
}
</script>

</body>
</html>
