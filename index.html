<!DOCTYPE html>
<html>
<head>
  <title>bruce-trail-map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet map library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 90vh; }
  </style>
</head>

<body>

<h2>Justyna & Raymond Take on The Bruce Trail</h2>

<div id="map"></div>

<script>
  var map = L.map('map').setView([43.1, -79.1], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

  var trail = [
    [43.1, -79.1],
    [43.5, -79.8],
    [44.0, -80.2],
    [44.6, -80.8],
    [45.0, -81.0]
  ];

  L.polyline(trail, { color: 'brown' }).addTo(map);

  var marker = L.marker(trail[0]).addTo(map)
    .bindPopup("Start: Niagara")
    .openPopup();
</script>

</body>
</html>
