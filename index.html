<!DOCTYPE html>
<html>
<head>
  <title>bruce-trail-map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet map library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 90vh; }
  </style>
</head>

<body>

<h2>Justyna & Raymond Take on The Bruce Trail</h2>

<h3>Justyna</h3>
<input id="youKm" type="number" placeholder="Your km">
<button onclick="moveYou()">Move You</button>

<h3>Raymond</h3>
<input id="rayKm" type="number" placeholder="Ray's km">
<button onclick="moveRay()">Move Ray</button>
  
<div id="map"></div>

<script>
var map = L.map('map').setView([43.1, -79.1], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

var trail = [
  [43.1, -79.1],
  [43.5, -79.8],
  [44.0, -80.2],
  [44.6, -80.8],
  [45.0, -81.0]
];

L.polyline(trail, { color: 'brown' }).addTo(map);

// YOU
var youMarker = L.marker(trail[0], {
  icon: L.divIcon({ className: "you-icon" })
}).addTo(map);

// RAYMOND
var rayMarker = L.marker(trail[0], {
  icon: L.divIcon({ className: "bf-icon" })
}).addTo(map);

function moveYou() {
  let km = Number(document.getElementById("youKm").value);
  let index = Math.floor(km / 10);
  if (index >= trail.length) index = trail.length - 1;
  youMarker.setLatLng(trail[index]);
}

function moveBF() {
  let km = Number(document.getElementById("bfKm").value);
  let index = Math.floor(km / 10);
  if (index >= trail.length) index = trail.length - 1;
  bfMarker.setLatLng(trail[index]);
}
</script>

</body>
</html>
